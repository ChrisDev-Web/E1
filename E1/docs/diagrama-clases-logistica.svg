  <text x="80" y="680" class="small">Lectura rapida: la seccion superior resume las asociaciones de negocio y claves foraneas. La parte inferior lista la clase principal y sus operaciones reales por tabla.</text>

  <rect class="panel" x="50" y="805" width="2000" height="1580"/>
  <text x="80" y="850" class="section-title">2. Clases y metodos encontrados en el proyecto</text>

  <rect x="60" y="885" width="610" height="285" class="panel"/>
  <rect x="60" y="885" width="610" height="44" class="band-blue"/>
  <text x="82" y="914" class="title">Users -> Models.User</text>
  <text x="82" y="952" class="card-subtitle">Campos clave</text>
  <text x="82" y="980" class="body">idUser, userName, password, status, createdAt, updatedAt</text>
  <text x="82" y="1014" class="card-subtitle">Controller: UserController</text>
  <text x="82" y="1042" class="body">registerUser, createUser, loginUser, searchUsers</text>
  <text x="82" y="1068" class="body">findUserById, updateUser, deleteUser</text>
  <text x="82" y="1102" class="card-subtitle">Persistencia</text>
  <text x="82" y="1130" class="body">IUserRepository / UserDAO:</text>
  <text x="82" y="1156" class="body">register, update, deleteById, findById, search, login</text>

  <rect x="745" y="885" width="610" height="285" class="panel"/>
  <rect x="745" y="885" width="610" height="44" class="band-slate"/>
  <text x="767" y="914" class="title">DocumentTypes -> sin clase dedicada</text>
  <text x="767" y="952" class="card-subtitle">Mapeo real encontrado</text>
  <text x="767" y="980" class="body">No existe Models.DocumentType ni DAO propio.</text>
  <text x="767" y="1006" class="body">Se usa desde Models.Client:</text>
  <text x="767" y="1032" class="body">idDocumentType, documentTypeName</text>
  <text x="767" y="1066" class="card-subtitle">Funciones relacionadas</text>
  <text x="767" y="1094" class="body">IClientRepository / ClientDAO / ClientController:</text>
  <text x="767" y="1120" class="body">listDocumentTypes()</text>
  <text x="767" y="1154" class="body">Se expone como Client.ReferenceItem para combos.</text>

  <rect x="1430" y="885" width="610" height="285" class="panel"/>
  <rect x="1430" y="885" width="610" height="44" class="band-green"/>
  <text x="1452" y="914" class="title">Categories -> Models.Category</text>
  <text x="1452" y="952" class="card-subtitle">Campos clave</text>
  <text x="1452" y="980" class="body">idCategory, categoryName, description, imagePath</text>
  <text x="1452" y="1014" class="card-subtitle">Controller: CategoryController</text>
  <text x="1452" y="1042" class="body">listCategories, searchCategories</text>
  <text x="1452" y="1068" class="body">createCategory, updateCategory, deleteCategory</text>
  <text x="1452" y="1102" class="card-subtitle">DAO</text>
  <text x="1452" y="1130" class="body">CategoryDAO: listar, buscar, registrar, modificar, eliminar</text>

  <rect x="60" y="1210" width="610" height="285" class="panel"/>
  <rect x="60" y="1210" width="610" height="44" class="band-green"/>
  <text x="82" y="1239" class="title">Products -> Models.Product</text>
  <text x="82" y="1277" class="card-subtitle">Campos clave</text>
  <text x="82" y="1305" class="body">idProduct, idCategory, sku, productName, unitWeightKg</text>
  <text x="82" y="1331" class="body">unitPrice, status, createdAt, updatedAt</text>
  <text x="82" y="1365" class="card-subtitle">Controller: ProductController</text>
  <text x="82" y="1393" class="body">listProducts, searchProducts, listCategories</text>
  <text x="82" y="1419" class="body">createProduct, updateProduct, deleteProduct</text>
  <text x="82" y="1453" class="card-subtitle">DAO</text>
  <text x="82" y="1481" class="body">ProductDAO: listar, buscar, registrar, modificar, eliminar</text>

  <rect x="745" y="1210" width="610" height="285" class="panel"/>
  <rect x="745" y="1210" width="610" height="44" class="band-gold"/>
