  <text x="82" y="1602" class="card-subtitle">Campos clave</text>
  <text x="82" y="1630" class="body">idClient, name, lastNamePaternal, lastNameMaternal</text>
  <text x="82" y="1656" class="body">idDocumentType, documentTypeName, documentNumber</text>
  <text x="82" y="1682" class="body">companyName, phone, email, address, city, country</text>
  <text x="82" y="1716" class="card-subtitle">Controller: ClientController</text>
  <text x="82" y="1744" class="body">createClient, updateClient, softDeleteClient, deleteClient</text>
  <text x="82" y="1770" class="body">restoreClient, findClientById, searchActiveClients</text>
  <text x="82" y="1796" class="body">searchInactiveClients, listDocumentTypes, listClientOptions</text>

  <rect x="745" y="1535" width="610" height="285" class="panel"/>
  <rect x="745" y="1535" width="610" height="44" class="band-red"/>
  <text x="767" y="1564" class="title">Shipments -> Models.Shipment</text>
  <text x="767" y="1602" class="card-subtitle">Campos clave</text>
  <text x="767" y="1630" class="body">idShipment, trackingCode, idClient, idWarehouseOrigin</text>
  <text x="767" y="1656" class="body">idUser, shipmentDate, estimatedDeliveryDate, deliveredAt</text>
  <text x="767" y="1682" class="body">status, notes, createdAt, updatedAt</text>
  <text x="767" y="1716" class="card-subtitle">Controller: ShipmentController</text>
  <text x="767" y="1744" class="body">createShipment, updateShipment, searchShipments</text>
  <text x="767" y="1770" class="body">findShipmentById, findShipmentByTrackingCode, getShipmentDetail</text>
  <text x="767" y="1796" class="body">changeShipmentStatus, markShipmentAsDelivered, cancelShipment</text>

  <rect x="1430" y="1535" width="610" height="285" class="panel"/>
  <rect x="1430" y="1535" width="610" height="44" class="band-red"/>
  <text x="1452" y="1564" class="title">Boxes -> Models.Box</text>
  <text x="1452" y="1602" class="card-subtitle">Campos clave</text>
  <text x="1452" y="1630" class="body">idBox, idShipment, boxCode, imagePath</text>
  <text x="1452" y="1656" class="body">lengthCm, widthCm, heightCm, weightKg</text>
  <text x="1452" y="1682" class="body">declaredValue, status, createdAt, updatedAt</text>
  <text x="1452" y="1716" class="card-subtitle">Controller: BoxController</text>
  <text x="1452" y="1744" class="body">createBox, updateBox, deleteBox, findBoxById</text>
  <text x="1452" y="1770" class="body">listBoxes, listBoxesByShipment, listShipmentOptions</text>
  <text x="1452" y="1804" class="card-subtitle">Persistencia</text>
  <text x="1452" y="1832" class="body">IBoxRepository / BoxDAO: create, update, delete, findById, list, listByShipment</text>

  <rect x="60" y="1860" width="610" height="285" class="panel"/>
  <rect x="60" y="1860" width="610" height="44" class="band-slate"/>
  <text x="82" y="1889" class="title">ShipmentDetails -> Models.ShipmentDetail</text>
  <text x="82" y="1927" class="card-subtitle">Campos clave</text>
  <text x="82" y="1955" class="body">idShipmentDetail, idShipment, idBox, idProduct</text>
  <text x="82" y="1981" class="body">quantity, unitWeightKg, createdAt</text>
  <text x="82" y="2015" class="card-subtitle">Controller: ShipmentDetailController</text>
  <text x="82" y="2043" class="body">createDetail, updateDetail, deleteDetail, listDetails</text>
  <text x="82" y="2069" class="body">listDetailsByShipment, listDetailsByBox</text>
  <text x="82" y="2095" class="body">listShipmentOptions, listBoxOptions, listBoxOptionsByShipment, listProductOptions</text>

  <rect x="745" y="1860" width="610" height="285" class="panel"/>
  <rect x="745" y="1860" width="610" height="44" class="band-slate"/>
  <text x="767" y="1889" class="title">ShipmentTracking -> Models.ShipmentTracking</text>
  <text x="767" y="1927" class="card-subtitle">Campos clave</text>
  <text x="767" y="1955" class="body">idTracking, idShipment, idUser, trackingDate</text>
  <text x="767" y="1981" class="body">location, status, comments</text>
  <text x="767" y="2015" class="card-subtitle">Controller: ShipmentTrackingController</text>
  <text x="767" y="2043" class="body">createTracking, updateTracking, deleteTracking</text>
  <text x="767" y="2069" class="body">listTracking, listTrackingByShipment</text>
  <text x="767" y="2095" class="body">listShipmentOptions, listUserOptions</text>
  <text x="767" y="2129" class="card-subtitle">Persistencia</text>
  <text x="767" y="2157" class="body">IShipmentTrackingRepository / ShipmentTrackingDAO</text>

  <rect x="1430" y="1860" width="610" height="285" class="panel"/>
  <rect x="1430" y="1860" width="610" height="44" class="band-blue"/>
  <text x="1452" y="1889" class="title">Notas de analisis</text>
  <text x="1452" y="1927" class="body">1) DocumentTypes se maneja como dato de referencia, no como clase propia.</text>
  <text x="1452" y="1961" class="body">2) Shipments y Clients tienen clases internas:</text>
  <text x="1452" y="1987" class="body">   Filter, PaginatedResult, ReferenceItem; Shipment agrega Detail y Tracking.</text>
  <text x="1452" y="2021" class="body">3) BoxDAO, ShipmentDetailDAO y ShipmentTrackingDAO implementan interfaces</text>
  <text x="1452" y="2047" class="body">   directamente; no pasan por una clase Repository intermedia.</text>
  <text x="1452" y="2081" class="body">4) Inventory incluye campos extra para UI:</text>
  <text x="1452" y="2107" class="body">   warehouseName, productName y productSku.</text>
  <text x="1452" y="2141" class="body">5) El SQL compartido tiene Warehouses.image_path, pero el modelo</text>
  <text x="1452" y="2167" class="body">   Models.Warehouses no expone imagePath ni el controller lo maneja.</text>

  <text x="60" y="2360" class="small">Archivo generado por analisis local del proyecto en C:\Users\crist\Documents\NetBeansProjects\E1\E1</text>
