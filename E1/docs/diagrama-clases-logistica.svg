  <text x="1452" y="1505" class="card-subtitle">Repo / DAO</text>
  <text x="1452" y="1533" class="body">save, update, search, transferStock</text>

  <rect x="60" y="1535" width="610" height="285" class="panel"/>
  <rect x="60" y="1535" width="610" height="44" class="band-red"/>
